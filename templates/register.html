{% extends 'base.html' %}

{% block content %}

<div class="register-container">

    <form method="POST" class="glass-card">

        <h1>Create Account</h1>

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <input
            type="text"
            name="phone"
            placeholder="Phone Number"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <select name="role">

            <option value="Customer">
                Customer
            </option>

            <option value="Service Provider">
                Service Provider
            </option>

        </select>

        <textarea
            name="address"
            placeholder="Address"
        ></textarea>

        <button type="submit">
            Register
        </button>

        <p style="margin-top:20px;">

            Already have account?

            <a href="/login">
                Login
            </a>

        </p>

    </form>

</div>

{% endblock %}
